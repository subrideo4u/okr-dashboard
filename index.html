        header { text-align: center; margin-bottom: 30px; }

            font-size: 2.5rem; margin-bottom: 10px;

        }
        .update-time { color: #94a3b8; font-size: 0.9rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .tab {
            padding: 12px 24px; background: rgba(255,255,255,0.1); border: none;
            border-radius: 8px; color: #e8eef7; cursor: pointer; transition: all 0.3s;
            font-size: 1rem; backdrop-filter: blur(10px);
        }
        .tab:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .tab.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 24px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;
        }
        .card:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 24px; border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .stat-value {
            font-size: 2.5rem; font-weight: bold; margin: 10px 0;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-label { color: #94a3b8; font-size: 0.9rem; }
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th {
            background: rgba(59,130,246,0.2); padding: 16px 12px; text-align: left;
            font-weight: 600; border-bottom: 2px solid rgba(59,130,246,0.4);
        }
        .ranking-table td { padding: 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .ranking-table tr:hover { background: rgba(255,255,255,0.05); }
        .rank-number { font-weight: bold; font-size: 1.2rem; min-width: 50px; display: inline-block; }
        .rank-medal { font-size: 1.5rem; }
        .progress-bar {
            width: 100%; height: 24px; background: rgba(255,255,255,0.1);
            border-radius: 12px; overflow: hidden; position: relative;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 12px; transition: width 0.5s ease;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 600; color: white;
        }
        .progress-fill.medium { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-fill.low { background: linear-gradient(90deg, #ef4444, #f87171); }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-input {
            flex: 1; min-width: 250px; padding: 12px 16px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; color: #e8eef7; font-size: 1rem;
        }
        .search-input::placeholder { color: #94a3b8; }
        select {
            padding: 12px 16px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            color: #e8eef7; font-size: 1rem; cursor: pointer;
        }
        .coaching-badge {
            display: inline-block; padding: 4px 12px;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            border-radius: 12px; font-size: 0.75rem; font-weight: 600;
            margin-left: 8px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .weight-tag {
            display: inline-block; padding: 2px 8px;
            background: rgba(139,92,246,0.3); border: 1px solid rgba(139,92,246,0.5);
            border-radius: 8px; font-size: 0.8rem; margin-left: 8px;
        }
        .no-weight-tag { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #fca5a5; }
        .kr-list { margin-top: 12px; padding-left: 20px; }
        .kr-item {
            margin-bottom: 8px; padding: 8px;
            background: rgba(255,255,255,0.05); border-radius: 6px; font-size: 0.9rem;
        }
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; color: #60a5fa; }
        .loading::after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
        .refresh-btn {
            padding: 10px 20px; background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none; border-radius: 8px; color: white; cursor: pointer;
            font-size: 0.9rem; transition: all 0.3s;
        }
        .refresh-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
        .team-filter { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .team-chip {
            padding: 8px 16px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            cursor: pointer; transition: all 0.3s; font-size: 0.9rem;

        .team-chip.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-color: transparent; }
        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .sub-tab {
            padding: 12px 24px; background: transparent; border: none;
            color: #94a3b8; cursor: pointer; transition: all 0.3s;
            font-size: 1rem; border-bottom: 3px solid transparent;
        }
        .sub-tab:hover { color: #e8eef7; }
        .sub-tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }

        <div id="updates" class="tab-content">

        let allPersonsData = [], teamsData = {}, allKRData = [], allTaskData = [];

        // ✅ Vercel /api/notion 서버리스 함수 경유 (CORS 없음)
        async function notionAPI(endpoint, body = null) {
            const payload = { endpoint };
            if (body) payload.body = body;
            const response = await fetch(SELF_PROXY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(`Notion API 오류 (${response.status}): ${data.message || data.error || JSON.stringify(data)}`);
            }
            return data;
        }

        async function fetchAllPages(dbId, filter = null) {
            let results = [], cursor = undefined;
            do {
                const body = { page_size: 100 };
                if (filter) body.filter = filter;
                if (cursor) body.start_cursor = cursor;
                const data = await notionAPI(`/databases/${dbId}/query`, body);
                results = results.concat(data.results || []);
                cursor = data.has_more ? data.next_cursor : undefined;
            } while (cursor);
            return results;
        }

        function extractText(prop) {
            if (!prop) return '';
            for (const key of ['title', 'rich_text']) {
                const arr = prop[key];
                if (arr && arr.length > 0) return arr[0].plain_text || '';
            }
            return '';
        }

        function extractPeople(prop) {
            if (!prop) return [];
            return (prop.people || []).map(p => (p.name || '').trim()).filter(n => n);
        }

        function getProgressColor(rate) {
            if (rate >= 70) return '';
            if (rate >= 40) return 'medium';
            return 'low';
        }

        async function loadAllData() {
            document.getElementById('updateTime').textContent = '로딩 중...';
            ['overview','teams','updates'].forEach(id => {
                document.getElementById(id).innerHTML = '<div class="loading">데이터를 불러오는 중입니다</div>';
            });
            try {
                // 1. Tracking
                const trackingMap = {};
                for (const [teamName, dbs] of Object.entries(TEAM_DATABASES)) {
                    const recs = await fetchAllPages(dbs.tracking);
                    for (const rec of recs) {
                        const props = rec.properties || {};
                        const krRel = props[dbs.trackingRelationProp]?.relation || [];
                        const trackNum = props['트래킹']?.number;
                        const dateStr = props['날짜']?.date?.start;
                        for (const krRef of krRel) {
                            const krId = krRef.id;
                            if (!trackingMap[krId]) trackingMap[krId] = [];
                            if (trackNum !== null && trackNum !== undefined) {
                                trackingMap[krId].push({ value: trackNum, date: dateStr || '1900-01-01' });
                            }
                        }
                    }
                }

                // 2. KR
                allKRData = [];
                const allKRMap = {};
                for (const [teamName, dbs] of Object.entries(TEAM_DATABASES)) {
                    const recs = await fetchAllPages(dbs.kr);
                    for (const rec of recs) {
                        const krId = rec.id;
                        const props = rec.properties || {};
                        const krName = extractText(props['핵심결과']);
                        const pmList = extractPeople(props['PM']);
                        const target = props['목표치']?.number || 100;
                        const unit = props['지표(단위)']?.select?.name || '';
                        const status = props['상태']?.status?.name || '';
                        const entries = (trackingMap[krId] || []).sort((a,b) => b.date.localeCompare(a.date));
                        const latestVal = entries.length > 0 ? entries[0].value : null;
                        const achievementRate = (latestVal !== null && target > 0) ? Math.min(100,(latestVal/target)*100) : 0;
                        const krData = { id:krId, team:teamName, name:krName, pm:pmList, target, unit, status, latestTracking:latestVal, achievementRate, trackingCount:entries.length };
                        allKRData.push(krData);
                        allKRMap[krId] = krData;
                    }
                }

                // 3. TASK
                allTaskData = [];
                const personTaskMap = {};
                for (const [teamName, dbs] of Object.entries(TEAM_DATABASES)) {
                    const recs = await fetchAllPages(dbs.task);
                    for (const rec of recs) {
                        const props = rec.properties || {};
                        const people = extractPeople(props['담당자']);
                        const achvF = props['달성율(F)'];
                        let achvVal = null;
                        if (achvF?.type === 'formula') { const f = achvF.formula; achvVal = f?.type === 'number' ? f.number : null; }
                        else if (achvF?.type === 'number') { achvVal = achvF.number; }
                        const statusName = props['상태']?.status?.name || '';
                        const isCompleted = (statusName === '완료') || (achvVal && achvVal >= 1.0);
                        const taskName = extractText(props['프로젝트명'] || props['이름'] || props['Task']);
                        const dueDate = props['예정 날짜']?.date?.start;
                        allTaskData.push({ team:teamName, name:taskName, people, status:statusName, achievement:achvVal, completed:isCompleted, dueDate });
                        for (const person of people) {
                            if (!person) continue;
                            const key = `${teamName}::${person}`;
                            if (!personTaskMap[key]) personTaskMap[key] = { team:teamName, person, total:0, completed:0, tasks:[] };
                            personTaskMap[key].total++;
                            if (isCompleted) personTaskMap[key].completed++;
                            personTaskMap[key].tasks.push({ name:taskName, status:statusName, achievement:achvVal, dueDate });
                        }
                    }
                }

                // 4. KR 집계
                const personKRMap = {};
                for (const kr of allKRData) {
                    for (const pm of kr.pm) {
                        if (!pm) continue;
                        const key = `${kr.team}::${pm}`;
                        if (!personKRMap[key]) personKRMap[key] = { team:kr.team, person:pm, krList:[], totalRate:0, count:0 };
                        let weight = null;
                        const tw = KR_WEIGHTS[kr.team];
                        if (tw && tw[pm]) { const f = tw[pm].find(w => kr.name.includes(w.name) || w.name.includes(kr.name)); if (f) weight = f.weight; }
                        personKRMap[key].krList.push({ name:kr.name, target:kr.target, latest:kr.latestTracking, achievement:kr.achievementRate, unit:kr.unit, status:kr.status, weight, trackingCount:kr.trackingCount });
                        personKRMap[key].totalRate += kr.achievementRate;
                        personKRMap[key].count++;
                    }
                }
                for (const key in personKRMap) {
                    const pk = personKRMap[key];
                    pk.avgKRRate = pk.count > 0 ? pk.totalRate / pk.count : 0;
                }

                // 5. 통합
                allPersonsData = [];
                const allKeys = new Set([...Object.keys(personKRMap), ...Object.keys(personTaskMap)]);
                for (const key of allKeys) {
                    const [team, person] = key.split('::');
                    const krInfo = personKRMap[key] || { avgKRRate:0, krList:[], count:0 };
                    const taskInfo = personTaskMap[key] || { total:0, completed:0, tasks:[] };
                    const krRate = krInfo.avgKRRate || 0;
                    const taskRate = taskInfo.total > 0 ? (taskInfo.completed / taskInfo.total) * 100 : 0;
                    allPersonsData.push({
                        team, person,
                        krRate: Math.round(krRate*10)/10, krCount: krInfo.count, krList: krInfo.krList,
                        taskRate: Math.round(taskRate*10)/10, taskTotal: taskInfo.total, taskCompleted: taskInfo.completed,
                        tasks: taskInfo.tasks || [],
                        combinedScore: Math.round((krRate*0.6 + taskRate*0.4)*10)/10
                    });
                }

                // 팀별
                teamsData = {};
                for (const p of allPersonsData) {
                    if (!teamsData[p.team]) teamsData[p.team] = { members:0, totalKR:0, totalTask:0 };
                    teamsData[p.team].members++;
                    teamsData[p.team].totalKR += p.krRate;
                    teamsData[p.team].totalTask += p.taskRate;
                }
                for (const team in teamsData) {
                    const ts = teamsData[team];
                    ts.avgKR = Math.round(ts.totalKR/ts.members*10)/10;
                    ts.avgTask = Math.round(ts.totalTask/ts.members*10)/10;
                }

                document.getElementById('updateTime').textContent = new Date().toLocaleString('ko-KR');
                renderOverview(); renderRanking(); renderTeams(); renderUpdates();

            } catch (error) {
                console.error('데이터 로딩 오류:', error);
                document.getElementById('updateTime').textContent = '오류 발생';
                const errorMsg = `
                    <div class="card" style="background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);">
                        <h2 style="color:#f87171;margin-bottom:16px;">⚠️ 데이터 로딩 실패</h2>
                        <p style="margin-bottom:12px;">Notion API 연결에 문제가 발생했습니다.</p>
                        <p style="font-size:0.9rem;color:#94a3b8;margin-bottom:16px;">오류: ${error.message || '알 수 없는 오류'}</p>
                        <button class="refresh-btn" onclick="loadAllData()">🔄 다시 시도</button>
                        <div style="margin-top:16px;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px;font-size:0.85rem;">
                            <strong>확인 사항:</strong><br>
                            1. Vercel 배포가 완료되었는지 확인<br>
                            2. <a href="/api/notion" target="_blank" style="color:#60a5fa;">/api/notion 엔드포인트 접속 확인</a><br>
                            3. 페이지 새로고침 (F5)
                        </div>
                    </div>`;
                ['overview','teams','updates'].forEach(id => { document.getElementById(id).innerHTML = errorMsg; });
            }
        }

        function renderOverview() {
            const avgKR = allPersonsData.length > 0 ? Math.round(allPersonsData.reduce((s,p)=>s+p.krRate,0)/allPersonsData.length*10)/10 : 0;
            const avgTask = allPersonsData.length > 0 ? Math.round(allPersonsData.reduce((s,p)=>s+p.taskRate,0)/allPersonsData.length*10)/10 : 0;
            let html = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-label">평균 KR 달성률</div><div class="stat-value">${avgKR}%</div></div>
                    <div class="stat-card"><div class="stat-label">평균 TASK 완료율</div><div class="stat-value">${avgTask}%</div></div>
                    <div class="stat-card"><div class="stat-label">총 구성원</div><div class="stat-value">${allPersonsData.length}명</div></div>
                </div>
                <div class="card"><h2 style="margin-bottom:20px;">팀별 현황</h2><div class="stats-grid">`;
            for (const [team, data] of Object.entries(teamsData)) {
                html += `<div class="stat-card" style="text-align:left;">
                    <h3 style="margin-bottom:12px;">${team}</h3>
                    <div style="font-size:0.9rem;color:#94a3b8;margin-bottom:8px;">구성원: ${data.members}명</div>
                    <div style="margin-bottom:8px;"><div style="font-size:0.85rem;margin-bottom:4px;">KR 달성률</div>
                    <div class="progress-bar"><div class="progress-fill ${getProgressColor(data.avgKR)}" style="width:${data.avgKR}%">${data.avgKR}%</div></div></div>
                    <div><div style="font-size:0.85rem;margin-bottom:4px;">TASK 완료율</div>
                    <div class="progress-bar"><div class="progress-fill ${getProgressColor(data.avgTask)}" style="width:${data.avgTask}%">${data.avgTask}%</div></div></div>

            document.getElementById('overview').innerHTML = html;

        function renderRanking() {
            const teamSelect = document.getElementById('teamFilterSelect');
            teamSelect.innerHTML = '<option value="">전체 팀</option>';
            for (const team of Object.keys(teamsData)) teamSelect.innerHTML += `<option value="${team}">${team}</option>`;
            renderRankingTable('combined','combinedRanking');
            renderRankingTable('kr','krRanking');
            renderRankingTable('task','taskRanking');
        }

        function renderRankingTable(type, containerId) {
            const sortKey = type === 'combined' ? 'combinedScore' : type === 'kr' ? 'krRate' : 'taskRate';
            const sortLabel = type === 'combined' ? '종합점수' : type === 'kr' ? 'KR 달성률' : 'TASK 완료율';
            const sortedData = [...allPersonsData].sort((a,b) => b[sortKey] - a[sortKey]);
            const bottomStart = sortedData.length - 10;
            let html = `<table class="ranking-table"><thead><tr>
                <th style="width:80px;">순위</th><th>이름</th><th>팀</th>
                <th>KR 달성률</th><th>TASK 완료율</th><th>${sortLabel}</th>
                </tr></thead><tbody id="${containerId}Body">`;
            sortedData.forEach((person, idx) => {
                const rank = idx + 1;
                const medal = rank===1?'<span class="rank-medal">🥇</span>':rank===2?'<span class="rank-medal">🥈</span>':rank===3?'<span class="rank-medal">🥉</span>':'';
                const coaching = rank > bottomStart ? '<span class="coaching-badge">📋 코칭대상</span>' : '';
                html += `<tr data-team="${person.team}" data-person="${person.person}">
                    <td><span class="rank-number">${rank}</span> ${medal}</td>
                    <td><strong>${person.person}</strong>${coaching}</td>
                    <td>${person.team}</td>
                    <td><div class="progress-bar"><div class="progress-fill ${getProgressColor(person.krRate)}" style="width:${person.krRate}%">${person.krRate}%</div></div></td>
                    <td><div class="progress-bar"><div class="progress-fill ${getProgressColor(person.taskRate)}" style="width:${person.taskRate}%">${person.taskRate}%</div></div></td>
                    <td><div class="progress-bar"><div class="progress-fill ${getProgressColor(person[sortKey])}" style="width:${person[sortKey]}%">${person[sortKey]}점</div></div></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById(containerId).innerHTML = html;
        }

        function filterRanking() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const team = document.getElementById('teamFilterSelect').value;
            ['combinedRankingBody','krRankingBody','taskRankingBody'].forEach(id => {
                const tbody = document.getElementById(id);
                if (!tbody) return;
                tbody.querySelectorAll('tr').forEach(row => {
                    const matchSearch = !search || row.dataset.person.toLowerCase().includes(search) || row.dataset.team.includes(search);
                    const matchTeam = !team || row.dataset.team === team;
                    row.style.display = matchSearch && matchTeam ? '' : 'none';
                });
            });
        }

        function showRankingTab(type) {
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.ranking-content').forEach(c => c.style.display = 'none');
            const map = { combined:'combinedRanking', kr:'krRanking', task:'taskRanking' };
            document.getElementById(map[type]).style.display = 'block';
        }

                        html += `<div class="kr-item">
                            <div style="margin-bottom:4px;"><strong>${kr.name}</strong> ${wtag}</div>
                            <div style="font-size:0.8rem;color:#94a3b8;margin-bottom:4px;">목표: ${kr.target}${kr.unit} / 현재: ${kr.latest !== null ? kr.latest : '-'}${kr.unit} (트래킹: ${kr.trackingCount}회)</div>
                            <div class="progress-bar"><div class="progress-fill ${getProgressColor(kr.achievement)}" style="width:${kr.achievement}%">${Math.round(kr.achievement*10)/10}%</div></div>
                        </div>`;
                    }
                } else { html += '<div style="color:#94a3b8;font-size:0.9rem;">KR이 없습니다</div>'; }
                html += `</div></div>
                    <div>
                        <h4 style="margin-bottom:8px;">TASK (${m.taskCompleted}/${m.taskTotal})</h4>
                        <div class="progress-bar"><div class="progress-fill ${getProgressColor(m.taskRate)}" style="width:${m.taskRate}%">${m.taskRate}%</div></div>
                    </div>
                </div>`;
            }
            html += '</div>';
            document.getElementById('teamDetail').innerHTML = html;
        }

        function renderUpdates() {
            const now = new Date();
            const notUpdated = [];
            for (const person of allPersonsData) {
                const notUpdatedKRs = (person.krList||[]).filter(kr => kr.trackingCount === 0 || kr.latest === null);
                const notUpdatedTasks = (person.tasks||[]).filter(task => {
                    if (!task.dueDate) return false;
                    return new Date(task.dueDate) < now && task.status !== '완료' && (task.achievement === null || task.achievement < 1);
                });
                if (notUpdatedKRs.length > 0 || notUpdatedTasks.length > 0) {
                    notUpdated.push({ team:person.team, person:person.person, notUpdatedKRs, notUpdatedTasks });
                }
            }
            let html = `<div class="card"><h2 style="margin-bottom:20px;">⚠️ 업데이트가 필요한 항목 (${notUpdated.length}명)</h2>`;
            if (notUpdated.length === 0) {
                html += '<div style="text-align:center;padding:40px;color:#94a3b8;">모든 항목이 업데이트되었습니다! 👍</div>';
            } else {
                html += '<div class="stats-grid">';
                for (const item of notUpdated) {
                    html += `<div class="card">
                        <h3 style="margin-bottom:8px;">${item.person} <span style="font-size:0.9rem;color:#94a3b8;">(${item.team})</span></h3>
                        ${item.notUpdatedKRs.length > 0 ? `<div style="margin-bottom:16px;">
                            <h4 style="color:#f59e0b;margin-bottom:8px;">📊 트래킹 필요 KR (${item.notUpdatedKRs.length}개)</h4>
                            <div class="kr-list">${item.notUpdatedKRs.map(kr=>`<div class="kr-item">${kr.name}<div style="font-size:0.8rem;color:#94a3b8;margin-top:4px;">트래킹 횟수: ${kr.trackingCount}회</div></div>`).join('')}</div>
                        </div>` : ''}
                        ${item.notUpdatedTasks.length > 0 ? `<div>
                            <h4 style="color:#ef4444;margin-bottom:8px;">📝 지연된 TASK (${item.notUpdatedTasks.length}개)</h4>
                            <div class="kr-list">${item.notUpdatedTasks.map(t=>`<div class="kr-item">${t.name}<div style="font-size:0.8rem;color:#94a3b8;margin-top:4px;">예정일: ${t.dueDate||'-'} | 상태: ${t.status}</div></div>`).join('')}</div>
                        </div>` : ''}
                    </div>`;
                }
                html += '</div>';
            }
            html += '</div>';
            document.getElementById('updates').innerHTML = html;
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        setInterval(loadAllData, 5 * 60 * 1000);
        loadAllData();
    </script>
</body>
</html>
